# Structured research entry conforming to contracts/research-contract.md
research_id: paper-2605.29207-augmentation-to-reconstruction
category: academic
question: >-
  Why has the expected AI disruption not yet fully arrived, and what institutional
  conditions determine whether it produces broad welfare gains versus hardening
  today's market structures into automated versions of the status quo?
scope: >-
  Perspective paper proposing a three-stage lens (Augmentation, Automation,
  Reconstruction) for AI integration, illustrated across shopping, education, news,
  and coding, with a normative argument for steering the agentic economy toward open,
  auditable, welfare-improving designs.
