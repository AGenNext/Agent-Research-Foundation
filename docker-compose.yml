version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'

  ui:
    image: node:20
    working_dir: /app
    volumes:
      - ./ui:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - '5173:5173'
    depends_on:
      - backend
